<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>South Dublin Schools Map</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  
  <!-- MarkerCluster CSS & JS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

  <style>
    :root {
      --primary: #1a237e;
      --bg: #f8f9fa;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --border: #e0e0e0;
      --shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); overflow: hidden; }
    #map { height: 100vh; width: 100%; }

    /* UI Layout */
    #ui-container {
      position: absolute; top: 15px; left: 15px; z-index: 1000;
      display: flex; flex-direction: column; gap: 15px; width: 340px;
      pointer-events: none; /* Let clicks pass through empty space */
    }
    .panel {
      background: var(--panel-bg); backdrop-filter: blur(10px);
      border-radius: 12px; padding: 15px; box-shadow: var(--shadow);
      pointer-events: auto; /* Catch clicks on panels */
      border: 1px solid rgba(255,255,255,0.4);
    }

    /* Title Panel */
    .title-main { font-size: 18px; font-weight: 800; color: var(--primary); }
    .title-sub  { font-size: 11px; color: #666; margin-top: 4px; }

    /* Search Bar */
    #search-box { position: relative; }
    #search-input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--primary); }
    #search-results {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border-radius: 8px; box-shadow: var(--shadow);
      max-height: 250px; overflow-y: auto; margin-top: 5px;
      display: none; list-style: none; z-index: 1001;
    }
    #search-results li {
      padding: 8px 14px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #eee;
    }
    #search-results li:hover { background: #f0f4f8; }

    /* Filters Panel */
    .collapsible-header {
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; font-weight: 600; font-size: 13px; color: #444;
    }
    .collapsible-content { margin-top: 15px; display: block; }
    
    .filter-group { margin-bottom: 12px; }
    .filter-label { font-size: 10px; color: #777; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block;}
    .filter-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 12px; border-radius: 14px; border: 2px solid; cursor: pointer;
      font-size: 11px; font-weight: 600; transition: all 0.15s; background: white;
    }

    /* Toggles */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-top:10px; padding-top:10px; border-top:1px solid #eee;}
    
    /* Sidebar */
    #sidebar {
      position: absolute; top: 0; right: -400px; width: 380px; height: 100vh;
      background: white; z-index: 1001; box-shadow: -5px 0 25px rgba(0,0,0,0.1);
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
    }
    #sidebar.open { right: 0; }
    #sidebar-header {
      padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start;
      background: var(--bg);
    }
    #close-sidebar {
      background: none; border: none; font-size: 20px; cursor: pointer; color: #888;
    }
    #close-sidebar:hover { color: #333; }
    #sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; }
    
    .sb-name { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 10px; line-height: 1.2; }
    .sb-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .b-pre { background:#E8F5E9; color:#2E7D32; }
    .b-pri { background:#E3F2FD; color:#1565C0; }
    .b-sec { background:#EDE7F6; color:#4527A0; }
    .b-boy { background:#BBDEFB; color:#0D47A1; }
    .b-grl { background:#FCE4EC; color:#880E4F; }
    .b-coe { background:#E8EAF6; color:#283593; }
    .b-fee { background:#FFF3E0; color:#BF360C; }
    .b-fre { background:#E8F5E9; color:#1B5E20; }
    .b-iri { background:#FFFDE7; color:#F57F17; }
    
    .sb-section { margin-top: 20px; }
    .sb-section-title { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sb-text { font-size: 13px; color: #444; line-height: 1.5; }
    .sb-fee-val { font-size: 18px; font-weight: 800; color: #333; }
    
    .feeder-list { list-style: none; }
    .feeder-list li {
      padding: 8px 12px; background: #f8f9fa; border-radius: 6px; margin-bottom: 6px;
      font-size: 12px; cursor: pointer; border: 1px solid #eee; transition: background 0.2s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .feeder-list li:hover { background: #e9ecef; border-color: #ddd; }

    /* Custom Leaflet overrides */
    .leaflet-control-layers { border-radius: 10px !important; box-shadow: var(--shadow) !important; border: none !important; }
    
    /* Hide default popups completely since we use sidebar */
    .leaflet-popup { display: none !important; }
  </style>
</head>
<body>

<div id="ui-container">
  <div class="panel">
    <div class="title-main">South Dublin Schools</div>
    <div class="title-sub">Interactive Map & Feeder Visualisation</div>
  </div>

  <div class="panel" id="search-box">
    <input type="text" id="search-input" placeholder="Search for a school...">
    <ul id="search-results"></ul>
  </div>

  <div class="panel">
    <div class="collapsible-header" id="filters-header">
      <span>Filters & Layers</span>
      <span id="filters-icon">▼</span>
    </div>
    <div class="collapsible-content" id="filters-content">
      
      <div class="filter-group">
        <span class="filter-label">Level</span>
        <div class="filter-btns">
          <button class="filter-btn" id="f-preschool" onclick="toggleFilter('preschool')">Pre-school</button>
          <button class="filter-btn" id="f-primary" onclick="toggleFilter('primary')">Primary</button>
          <button class="filter-btn" id="f-secondary" onclick="toggleFilter('secondary')">Secondary</button>
        </div>
      </div>
      
      <div class="filter-group">
        <span class="filter-label">Gender</span>
        <div class="filter-btns">
          <button class="filter-btn" id="f-boys" onclick="toggleFilter('boys')">Boys</button>
          <button class="filter-btn" id="f-girls" onclick="toggleFilter('girls')">Girls</button>
          <button class="filter-btn" id="f-coed" onclick="toggleFilter('coed')">Co-ed</button>
        </div>
      </div>
      
      <div class="filter-group">
        <span class="filter-label">Fees</span>
        <div class="filter-btns">
          <button class="filter-btn" id="f-feepaying" onclick="toggleFilter('feepaying')">Fee-paying</button>
          <button class="filter-btn" id="f-free" onclick="toggleFilter('free')">Free</button>
        </div>
      </div>
      
      <div class="filter-group">
        <span class="filter-label">Special</span>
        <div class="filter-btns">
          <button class="filter-btn" id="f-irish" onclick="toggleFilter('irish')">★ Irish-medium</button>
        </div>
      </div>

      <div class="toggle-row">
        <strong>Show Parish Boundaries</strong>
        <input type="checkbox" id="toggle-parish" checked onchange="toggleParish()">
      </div>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <div style="flex:1">
      <div class="sb-name" id="sb-name">School Name</div>
      <div class="sb-badges" id="sb-badges"></div>
    </div>
    <button id="close-sidebar">✕</button>
  </div>
  <div id="sidebar-content">
    <div class="sb-section">
      <div class="sb-section-title">Tuition / Status</div>
      <div id="sb-fee" class="sb-fee-val">Free</div>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">Location</div>
      <div id="sb-location" class="sb-text">Location</div>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">Notes</div>
      <div id="sb-notes" class="sb-text">Notes</div>
    </div>
    <div class="sb-section" id="sb-feeder-section" style="display:none;">
      <div class="sb-section-title" id="sb-feeder-title">Feeder Schools</div>
      <ul class="feeder-list" id="sb-feeder-list"></ul>
    </div>
  </div>
</div>

// Map primary schools to secondary
const feederMap = {};
schools.forEach(s => { if (s.feeders) feederMap[s.id] = s.feeders; });
const secondaryToPrimaryMap = {};
Object.keys(feederMap).forEach(primaryId => {
  feederMap[primaryId].forEach(secId => {
    if (!secondaryToPrimaryMap[secId]) secondaryToPrimaryMap[secId] = [];
    secondaryToPrimaryMap[secId].push(primaryId);
  });
});

// ============================================================
// COLOUR SCHEME
// ============================================================
const COLORS = {
  boys_feepaying: { fill:'#1565C0', stroke:'#0D47A1' }, boys_free: { fill:'#90CAF9', stroke:'#1565C0' },
  girls_feepaying:{ fill:'#B71C1C', stroke:'#7B0000' }, girls_free: { fill:'#FFCDD2', stroke:'#C62828' },
  coed_feepaying: { fill:'#6A1B9A', stroke:'#38006B' }, coed_free: { fill:'#E1BEE7', stroke:'#7B1FA2' },
  preschool:      { fill:'#43A047', stroke:'#1B5E20' },
};
function getC(gender, fees) { return COLORS[`${gender}_${fees}`] || COLORS.coed_feepaying; }

function createIcon(school) {
  const isPreschool = school.type === 'preschool';
  const c = isPreschool ? COLORS.preschool : getC(school.gender, school.fees);
  const size = school.type === 'secondary' ? 22 : isPreschool ? 14 : 16;
  const star = school.irish ? `<div style="position:absolute;top:-5px;right:-5px;width:12px;height:12px;background:#F9A825;border-radius:50%;border:1.5px solid #BF360C;font-size:9px;display:flex;align-items:center;justify-content:center;color:#333;z-index:2">★</div>` : '';
  const shape = isPreschool ? `border-radius:3px` : `border-radius:50%`;
  return L.divIcon({
    html: `<div style="position:relative;width:${size}px;height:${size}px">
      <div style="width:${size}px;height:${size}px;${shape};background:${c.fill};border:2.5px solid ${c.stroke};box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>
      ${star}
    </div>`,
    className: '', iconSize: [size, size], iconAnchor: [size/2, size/2]
  });
}

// ============================================================
// CLUSTERING & MARKERS
// ============================================================
const markersGroup = L.markerClusterGroup({
  maxClusterRadius: 40,
  iconCreateFunction: function(cluster) {
    return L.divIcon({ html: '<div style="background:var(--primary);color:white;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;box-shadow:0 2px 5px rgba(0,0,0,0.3);border:2px solid white;">' + cluster.getChildCount() + '</div>', className: 'custom-cluster', iconSize: L.point(30, 30) });
  }
});

const allMarkers = [];
const markerMap = {};
let activeLines = [];

function clearLines() { activeLines.forEach(l => map.removeLayer(l)); activeLines = []; }
function drawLine(p1, p2, color) {
  activeLines.push(L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], { color: color, weight: 3, opacity: 0.7, dashArray: '6, 6' }).addTo(map));
}

// Sidebar references
const sb = document.getElementById('sidebar');
const sbName = document.getElementById('sb-name');
const sbBadges = document.getElementById('sb-badges');
const sbFee = document.getElementById('sb-fee');
const sbLoc = document.getElementById('sb-location');
const sbNotes = document.getElementById('sb-notes');
const sbFeederSec = document.getElementById('sb-feeder-section');
const sbFeederTitle = document.getElementById('sb-feeder-title');
const sbFeederList = document.getElementById('sb-feeder-list');

document.getElementById('close-sidebar').addEventListener('click', () => {
  sb.classList.remove('open');
  clearLines();
});

function openSidebar(data) {
  sbName.textContent = data.name;
  const gLabel = data.gender === 'boys' ? 'Boys' : data.gender === 'girls' ? 'Girls' : 'Co-ed';
  const gClass = data.gender === 'boys' ? 'b-boy' : data.gender === 'girls' ? 'b-grl' : 'b-coe';
  
  let badgesHTML = `
    <span class="badge ${data.type==='preschool'?'b-pre':data.type==='primary'?'b-pri':'b-sec'}">${data.type==='preschool'?'Pre-school':data.type==='primary'?'Primary':'Secondary'}</span>
    <span class="badge ${gClass}">${gLabel}</span>
    <span class="badge ${data.fees==='feepaying'?'b-fee':'b-fre'}">${data.fees==='feepaying'?'Fee-paying':'Free'}</span>
  `;
  if(data.irish) badgesHTML += `<span class="badge b-iri">★ Irish-medium</span>`;
  sbBadges.innerHTML = badgesHTML;
  
  sbFee.textContent = data.fees === 'feepaying' ? `€${data.annualFee.toLocaleString()} / year` : `Free`;
  sbLoc.textContent = data.area;
  sbNotes.textContent = data.notes;
  
  // Feeders
  sbFeederList.innerHTML = '';
  let relatedSchools = [];
  if (data.type === 'primary' && data.feeders) {
    relatedSchools = data.feeders.map(id => schools.find(sc => sc.id === id)).filter(Boolean);
    sbFeederTitle.textContent = "Feeds to Secondary Schools:";
  } else if (data.type === 'secondary' && secondaryToPrimaryMap[data.id]) {
    relatedSchools = secondaryToPrimaryMap[data.id].map(id => schools.find(sc => sc.id === id)).filter(Boolean);
    sbFeederTitle.textContent = "Feeder Primary Schools:";
  }
  
  if (relatedSchools.length > 0) {
    sbFeederSec.style.display = 'block';
    relatedSchools.forEach(rs => {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${rs.name}</strong> <span>📍 ${rs.area}</span>`;
      li.onclick = () => {
        map.setView([rs.lat, rs.lng], 15);
        openSidebar(rs);
        drawFeederLines(rs);
      };
      sbFeederList.appendChild(li);
    });
  } else {
    sbFeederSec.style.display = 'none';
  }
  
  sb.classList.add('open');
}

function drawFeederLines(data) {
  clearLines();
  if (data.type === 'primary' && data.feeders) {
    data.feeders.forEach(secId => {
      const secSchool = schools.find(sc => sc.id === secId);
      if (secSchool && markerMap[secId]) drawLine(data, secSchool, '#1565C0');
    });
  } else if (data.type === 'secondary' && secondaryToPrimaryMap[data.id]) {
    secondaryToPrimaryMap[data.id].forEach(priId => {
      const priSchool = schools.find(sc => sc.id === priId);
      if (priSchool && markerMap[priId]) drawLine(data, priSchool, '#2E7D32');
    });
  }
}

schools.forEach(s => {
  const m = L.marker([s.lat, s.lng], { icon: createIcon(s) });
  m._schoolData = s;
  m.on('click', function() {
    openSidebar(this._schoolData);
    drawFeederLines(this._schoolData);
    map.setView([s.lat, s.lng], Math.max(map.getZoom(), 14));
  });
  allMarkers.push(m);
  markerMap[s.id] = m;
  markersGroup.addLayer(m);
});
map.addLayer(markersGroup);

map.on('click', function(e) {
  // If clicking on map background (not a marker), close sidebar
  if (!e.originalEvent.target.closest('.leaflet-marker-icon')) {
    sb.classList.remove('open');
    clearLines();
  }
});

// SEARCH LOGIC
// ============================================================
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase();
  searchResults.innerHTML = '';
  if (q.length < 2) {
    searchResults.style.display = 'none';
    return;
  }
  const matches = schools.filter(s => (s.name || '').toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q));
  if (matches.length > 0) {
    searchResults.style.display = 'block';
    matches.slice(0, 8).forEach(match => {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${match.name}</strong> <span style="color:#888;font-size:10px">(${match.area})</span>`;
      li.onclick = () => {
        map.setView([match.lat, match.lng], 16);
        openSidebar(match);
        drawFeederLines(match);
        searchInput.value = '';
        searchResults.style.display = 'none';
      };
      searchResults.appendChild(li);
    });
  } else {
    searchResults.style.display = 'none';
  }
});

const activeFilters = {
  preschool:true, primary:true, secondary:true,
  boys:true, girls:true, coed:true,
  feepaying:true, free:true, irish:true
};
const btnCols = {
  preschool:'#2E7D32', primary:'#1565C0', secondary:'#6A1B9A',
  boys:'#1565C0', girls:'#B71C1C', coed:'#6A1B9A',
  feepaying:'#BF360C', free:'#2E7D32', irish:'#F9A825'
};

Object.keys(activeFilters).forEach(k => {
  const btn = document.getElementById('f-'+k);
  if (!btn) return;
  btn.style.borderColor = btnCols[k];
  btn.style.background = btnCols[k];
  btn.style.color = 'white';
});

window.toggleFilter = function(key) {
  activeFilters[key] = !activeFilters[key];
  const btn = document.getElementById('f-'+key);
  if (activeFilters[key]) {
    btn.style.background = btnCols[key];
    btn.style.color = 'white';
  } else {
    btn.style.background = 'white';
    btn.style.color = btnCols[key];
  }
  
  markersGroup.clearLayers();
  const activeSet = allMarkers.filter(m => {
    const s = m._schoolData;
    const irishOk = s.irish ? activeFilters.irish : true;
    return s.type === 'preschool'
      ? activeFilters.preschool && irishOk
      : activeFilters[s.type] && activeFilters[s.gender] && activeFilters[s.fees] && irishOk;
  });
  markersGroup.addLayers(activeSet);
  clearLines();
  sb.classList.remove('open');
};

</script>
</body>
</html><!-- Trigger update -->
